<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 700" role="img" aria-labelledby="title desc">
  <title id="title">VS Code Style Project Explorer</title>
  <desc id="desc">Animated project structure panel inspired by the Visual Studio Code explorer layout.</desc>

  <defs>
    <linearGradient id="shellBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#111827"/>
    </linearGradient>
    <linearGradient id="panelBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="100%" stop-color="#121a2a"/>
    </linearGradient>
    <linearGradient id="highlight" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1d4ed8" stop-opacity="0.45"/>
      <stop offset="100%" stop-color="#22d3ee" stop-opacity="0.2"/>
    </linearGradient>
    <linearGradient id="accentLine" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="60%" stop-color="#3b82f6"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="700" fill="url(#shellBg)"/>
  <rect x="24" y="24" width="1152" height="652" rx="18" fill="url(#panelBg)" stroke="#1e293b" stroke-width="2"/>

  <rect x="24" y="24" width="1152" height="52" rx="18" fill="#0a1220"/>
  <circle cx="54" cy="50" r="8" fill="#fb7185"/>
  <circle cx="80" cy="50" r="8" fill="#fbbf24"/>
  <circle cx="106" cy="50" r="8" fill="#4ade80"/>
  <text x="138" y="56" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="18">
    EXPLORER — Machine_Learning_Algorithms_Beginner_Friendly_Guide
  </text>

  <rect x="24" y="76" width="250" height="600" fill="#0a1220"/>
  <text x="44" y="112" fill="#93c5fd" font-family="Segoe UI, Arial, sans-serif" font-size="16" font-weight="700">PROJECT</text>
  <text x="44" y="142" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="14">Open Editors</text>
  <text x="44" y="172" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="14">Search</text>
  <text x="44" y="202" fill="#64748b" font-family="Segoe UI, Arial, sans-serif" font-size="14">Source Control</text>

  <line x1="274" y1="76" x2="274" y2="676" stroke="#1e293b" stroke-width="2"/>

  <rect x="292" y="98" width="860" height="30" fill="url(#highlight)">
    <animate attributeName="y" values="98;130;162;194;226;258;290;322;354;386;418;450;482;514;98" dur="14s" repeatCount="indefinite"/>
  </rect>

  <line x1="300" y1="88" x2="1140" y2="88" stroke="url(#accentLine)" stroke-width="2" stroke-dasharray="10 9">
    <animate attributeName="stroke-dashoffset" from="0" to="-152" dur="8s" repeatCount="indefinite"/>
  </line>

  <g font-family="Consolas, 'Courier New', monospace" font-size="18" fill="#e2e8f0">
    <text x="308" y="120">▾  Machine_Learning_Algorithms_Beginner_Friendly_Guide</text>
    <text x="340" y="152">▾  assets</text>
    <text x="372" y="184">•  ml-banner.svg</text>
    <text x="372" y="216">•  readme-divider.svg</text>
    <text x="372" y="248">•  vscode-explorer-animated.svg</text>
    <text x="340" y="280">•  README.md</text>
    <text x="340" y="312">▾  Regression</text>
    <text x="372" y="344">▾  Simple Linear</text>
    <text x="404" y="376">•  Guide.txt</text>
    <text x="404" y="408">•  Student_Performance.csv</text>
    <text x="404" y="440">•  image.png</text>
    <text x="404" y="472">•  student_scores_regression.ipynb</text>
    <text x="372" y="504">▾  Mutiple Linear</text>
    <text x="404" y="536">•  Guide.txt</text>
    <text x="404" y="568">•  advertising.csv</text>
    <text x="404" y="600">•  advertising_regression.ipynb</text>
  </g>

  <rect x="300" y="626" width="840" height="26" rx="8" fill="#0a1220" stroke="#1e293b" stroke-width="1"/>
  <text x="316" y="644" fill="#93c5fd" font-family="Consolas, 'Courier New', monospace" font-size="14">
    main | Python | Jupyter | Learning-first notebooks with interpretation notes
  </text>
</svg>
