<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 260" role="img" aria-labelledby="title desc">
  <title id="title">Machine Learning Repo Banner</title>
  <desc id="desc">Animated banner for a beginner machine learning repository.</desc>

  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0f172a">
        <animate attributeName="stop-color" values="#0f172a;#111827;#0f172a" dur="9s" repeatCount="indefinite"/>
      </stop>
      <stop offset="100%" stop-color="#1f2937">
        <animate attributeName="stop-color" values="#1f2937;#0b1220;#1f2937" dur="9s" repeatCount="indefinite"/>
      </stop>
    </linearGradient>

    <linearGradient id="lineGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#22d3ee"/>
      <stop offset="50%" stop-color="#60a5fa"/>
      <stop offset="100%" stop-color="#34d399"/>
    </linearGradient>
  </defs>

  <rect x="0" y="0" width="1200" height="260" fill="url(#bg)"/>

  <g opacity="0.08" stroke="#e2e8f0" stroke-width="1">
    <line x1="0" y1="50" x2="1200" y2="50"/>
    <line x1="0" y1="100" x2="1200" y2="100"/>
    <line x1="0" y1="150" x2="1200" y2="150"/>
    <line x1="0" y1="200" x2="1200" y2="200"/>
    <line x1="150" y1="0" x2="150" y2="260"/>
    <line x1="300" y1="0" x2="300" y2="260"/>
    <line x1="450" y1="0" x2="450" y2="260"/>
    <line x1="600" y1="0" x2="600" y2="260"/>
    <line x1="750" y1="0" x2="750" y2="260"/>
    <line x1="900" y1="0" x2="900" y2="260"/>
    <line x1="1050" y1="0" x2="1050" y2="260"/>
  </g>

  <polyline
    points="90,190 230,170 360,178 500,130 640,138 780,92 920,105 1060,62"
    fill="none"
    stroke="url(#lineGradient)"
    stroke-width="6"
    stroke-linecap="round"
    stroke-linejoin="round"
    stroke-dasharray="12 14">
    <animate attributeName="stroke-dashoffset" from="0" to="-104" dur="5s" repeatCount="indefinite"/>
  </polyline>

  <circle r="8" fill="#22d3ee" cy="190">
    <animate attributeName="cx" values="90;230;360;500;640;780;920;1060" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="cy" values="190;170;178;130;138;92;105;62" dur="5s" repeatCount="indefinite"/>
  </circle>

  <text x="70" y="100" fill="#f8fafc" font-family="Segoe UI, Arial, sans-serif" font-size="42" font-weight="700">
    Machine Learning Repo
  </text>
  <text x="72" y="142" fill="#cbd5e1" font-family="Segoe UI, Arial, sans-serif" font-size="22">
    Beginner guides and sample algorithms with practical notebooks
  </text>
</svg>
